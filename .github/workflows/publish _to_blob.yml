name: Publish Content Player Package to GCP

on:
  push:
    branches:
      - '*'

env:
  GCP_BUCKET: ${{ vars.GCP_BUCKET }}

jobs:
  build:
    name: Build and Upload to GCP
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '10.16.3'
          cache: 'npm'
          cache-dependency-path: player

      - name: Restore node_modules cache
        id: cache
        uses: actions/cache@v4
        with:
          path: player/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Python 2
        run: |
          sudo apt-get update
          sudo apt-get install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Set npm python config
        run: npm config set python /usr/bin/python2

      - name: Install dependencies
        working-directory: player
        run: npm i --legacy-peer-deps

      - name: Save node_modules cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: player/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Build preview
        working-directory: player
        run: npm run build-preview ekstep

    #   - name: Compress preview
    #     working-directory: player
    #     run: grunt compress:preview

      - name: Generate libs
        working-directory: player
        run: grunt generate-libs

      - name: Build and package
        run: |
          npm run build-npm-package
          ls -la

