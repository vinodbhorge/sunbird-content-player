name: Publish Content Player Package to GCP

on:
  push:
    branches:
      - '*'

jobs:
  build:
    name: Build and Upload to GCP
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '10.16.3'

      - name: Install dependencies
        working-directory: player
        run: npm i --legacy-peer-deps

      - name: Clean previous build
        working-directory: player
        run: |
          npm install --no-save rimraf
          ./node_modules/.bin/rimraf ./public/player-build ./www

      - name: Build preview
        working-directory: player
        run: npm run build-preview ekstep

    #   - name: Compress preview
    #     working-directory: player
    #     run: grunt compress:preview

      - name: Generate libs
        working-directory: player
        run: grunt generate-libs

      - name: Build and package
        run: |
          npm run build-npm-package
          ls -la

