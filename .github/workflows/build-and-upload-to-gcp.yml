name: Build and Upload to GCP

on:
  push:
    branches:
      - '*'

jobs:
  build-and-upload:
    name: Build and Upload to GCP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 10.16.3

      - name: Install Python 2 manually
        run: |
          sudo apt-get update
          sudo apt-get install -y wget make gcc libssl-dev zlib1g-dev libbz2-dev \
                                  libreadline-dev libsqlite3-dev libffi-dev
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --enable-optimizations
          make -j2
          sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python

                      
      - name: Set npm python config
        run: npm config set python /usr/bin/python

      - name: Install Dependencies
        working-directory: player
        run: npm install --legacy-peer-deps

      - name: Build preview
        working-directory: player
        run: npm run build-preview ekstep

      - name: Build Project
        working-directory: ./player
        run: |  
          npm run build-npm-package
          ls -la
          cd ./www/preview
          ls -la


